<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산형 연습 | 머신러닝 기말 대비</title>
  <meta name="description" content="행렬·거리·확률·평가지표 등 계산형 문제를 직접 풀고 모범답안·풀이·채점기준으로 확인." />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="calc" data-base="..">
  <a class="skip-link" href="#calcMount">본문 바로가기</a>
  <header class="site-header" id="app-header"></header>

  <main class="container">
    <section style="padding:28px 0 8px">
      <span class="eyebrow">🧮 계산형 연습</span>
      <h1 style="font-size:1.8rem;margin:8px 0 6px">계산형 문제 풀이</h1>
      <p class="muted">직선의 방정식·행렬식·거리/유사도·시그모이드·엔트로피·평가지표 등 손으로 계산하는 문제입니다. 답안을 작성한 뒤 <b>풀이 과정 보기</b>로 검산하세요.</p>
    </section>

    <div class="card" style="margin-bottom:18px">
      <div class="progress-label"><span>풀이 진행률</span><span id="calcProgressLabel">0 / 0</span></div>
      <div class="progress"><div class="progress__bar" id="calcProgress" style="width:0%"></div></div>
    </div>

    <div class="toolbar" id="calcToolbar"></div>
    <div class="filter-chips" id="calcTopics" style="margin-bottom:20px"></div>
    <div id="calcMount"></div>
  </main>

  <footer class="site-footer" id="app-footer"></footer>

  <script src="../assets/js/common.js"></script>
  <script src="../data/lecture_coverage.js"></script>
  <script src="../data/ml_practice.js"></script>
  <script src="../assets/js/practice.js"></script>
  <script>
    ML.practice.mount({
      mountId: "calcMount",
      data: window.ML_PRACTICE || [],
      filterTypes: ["계산형", "행렬벡터계산", "지표계산", "복잡도분석"],
      pageKey: "calculation",
      toolbarId: "calcToolbar",
      topicChipsId: "calcTopics",
      progressId: "calcProgress",
      progressLabelId: "calcProgressLabel"
    });
  </script>
</body>
</html>
