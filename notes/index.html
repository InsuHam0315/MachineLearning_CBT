<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개념노트 · 공식노트 · 예제 | 머신러닝 기말 대비</title>
  <meta name="description" content="지도학습부터 모델 평가까지 7개 강의의 깊이 있는 개념노트, 공식노트, 계산 예제." />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="notes" data-base="..">
  <a class="skip-link" href="#notesContent">본문 바로가기</a>
  <header class="site-header" id="app-header"></header>

  <main class="container">
    <section style="padding:28px 0 8px">
      <span class="eyebrow">📘 학습 노트</span>
      <h1 style="font-size:1.8rem;margin:8px 0 6px">개념노트 · 공식노트 · 계산 예제</h1>
      <p class="muted">처음 배우는 학생도 이 노트만으로 이해할 수 있도록 개념을 처음부터 풀어 설명합니다. 각 노트를 눌러 펼치세요.</p>
      <figure class="card" style="margin:14px 0 0;text-align:center">
        <img src="../assets/img/ml-overview.svg" alt="머신러닝 전체 개요 개념도" loading="lazy" style="width:100%;max-width:640px;border-radius:12px;background:#0a1322" />
        <figcaption class="muted" style="font-size:.82rem;margin-top:8px">머신러닝 한눈에 보기 — 지도/비지도, 분류/회귀/군집</figcaption>
      </figure>
    </section>

    <div class="toolbar">
      <input class="search-input" id="notesSearch" placeholder="🔍 개념·공식·예제 검색 (예: 엔트로피, 마진, 베이즈)" />
    </div>
    <div class="filter-chips" id="chapterChips" style="margin-bottom:20px"></div>

    <div class="layout">
      <div id="notesContent">
        <div class="empty-state"><div class="es-ico">⏳</div><p>노트를 불러오는 중…</p></div>
      </div>
      <aside class="toc" id="notesToc"></aside>
    </div>
  </main>

  <footer class="site-footer" id="app-footer"></footer>

  <script src="../assets/js/common.js"></script>
  <script src="../data/lecture_coverage.js"></script>
  <script src="../data/ml_notes.js"></script>
  <script src="../data/ml_formulas.js"></script>
  <script src="../data/ml_examples.js"></script>
  <script src="../assets/js/notes.js"></script>
</body>
</html>
