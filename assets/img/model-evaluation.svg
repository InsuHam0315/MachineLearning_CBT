<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 330" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="330" rx="16" fill="#0a1322"/>
  <text x="300" y="32" fill="#e7ecf5" font-size="17" font-weight="800" text-anchor="middle">혼동 행렬과 평가 지표</text>
  <!-- header labels -->
  <text x="300" y="58" fill="#8390a8" font-size="11" text-anchor="middle">실제 정답</text>
  <text x="118" y="120" fill="#8390a8" font-size="11" text-anchor="middle" transform="rotate(-90 118 120)">예측</text>
  <text x="232" y="78" fill="#b6f3da" font-size="11" text-anchor="middle">True</text>
  <text x="332" y="78" fill="#ffc9c9" font-size="11" text-anchor="middle">False</text>
  <text x="160" y="118" fill="#bcd2ff" font-size="11" text-anchor="end">Positive</text>
  <text x="160" y="178" fill="#bcd2ff" font-size="11" text-anchor="end">Negative</text>
  <!-- cells -->
  <rect x="182" y="88" width="100" height="56" rx="8" fill="#15422f" stroke="#34d399"/>
  <text x="232" y="112" fill="#b6f3da" font-size="14" font-weight="800" text-anchor="middle">TP</text>
  <text x="232" y="130" fill="#8390a8" font-size="10" text-anchor="middle">진짜 양성</text>
  <rect x="286" y="88" width="100" height="56" rx="8" fill="#3a1f24" stroke="#f87171"/>
  <text x="336" y="112" fill="#ffc9c9" font-size="14" font-weight="800" text-anchor="middle">FP</text>
  <text x="336" y="130" fill="#8390a8" font-size="10" text-anchor="middle">Type I 오류</text>
  <rect x="182" y="148" width="100" height="56" rx="8" fill="#3a1f24" stroke="#f87171"/>
  <text x="232" y="172" fill="#ffc9c9" font-size="14" font-weight="800" text-anchor="middle">FN</text>
  <text x="232" y="190" fill="#8390a8" font-size="10" text-anchor="middle">Type II 오류</text>
  <rect x="286" y="148" width="100" height="56" rx="8" fill="#16294d" stroke="#4f86f7"/>
  <text x="336" y="172" fill="#bcd2ff" font-size="14" font-weight="800" text-anchor="middle">TN</text>
  <text x="336" y="190" fill="#8390a8" font-size="10" text-anchor="middle">진짜 음성</text>
  <!-- metrics -->
  <rect x="408" y="88" width="168" height="116" rx="10" fill="#0f1b30" stroke="#42506b"/>
  <text x="424" y="110" fill="#22d3ee" font-size="11.5" font-weight="700">정밀도 = TP/(TP+FP)</text>
  <text x="424" y="132" fill="#34d399" font-size="11.5" font-weight="700">재현율 = TP/(TP+FN)</text>
  <text x="424" y="154" fill="#a78bfa" font-size="11.5" font-weight="700">특이도 = TN/(TN+FP)</text>
  <text x="424" y="176" fill="#fbbf24" font-size="11.5" font-weight="700">정확도 = (TP+TN)/전체</text>
  <text x="424" y="196" fill="#e7ecf5" font-size="11.5" font-weight="800">F1 = 2PR/(P+R)</text>
  <text x="300" y="240" fill="#8390a8" font-size="11.5" text-anchor="middle">정밀도와 재현율은 트레이드오프 관계 · F1은 둘의 조화평균</text>
  <text x="300" y="262" fill="#8390a8" font-size="11" text-anchor="middle">클래스 불균형일 때는 정확도만으로 판단하면 위험</text>
  <text x="300" y="300" fill="#6c7a93" font-size="10.5" text-anchor="middle">예) TP=56, FP=7, FN=5, TN=42 → 재현율 56/61≈0.92, 정밀도 56/63≈0.89</text>
</svg>
