<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="320" rx="16" fill="#0a1322"/>
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f86f7"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <text x="300" y="32" fill="#e7ecf5" font-size="17" font-weight="800" text-anchor="middle">지도학습 파이프라인</text>

  <!-- Train -->
  <text x="150" y="66" fill="#bcd2ff" font-size="12" font-weight="700" text-anchor="middle">Train Step (학습)</text>
  <rect x="40" y="78" width="100" height="44" rx="9" fill="#0f1b30" stroke="#4f86f7"/>
  <text x="90" y="98" fill="#e7ecf5" font-size="11.5" text-anchor="middle">학습 데이터</text>
  <text x="90" y="113" fill="#8390a8" font-size="10" text-anchor="middle">표본+정답(label)</text>
  <line x1="142" y1="100" x2="186" y2="100" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="190" y="78" width="100" height="44" rx="9" fill="#0f1b30" stroke="#4f86f7"/>
  <text x="240" y="98" fill="#e7ecf5" font-size="11.5" text-anchor="middle">분류기 학습</text>
  <text x="240" y="113" fill="#8390a8" font-size="10" text-anchor="middle">우도/엔트로피 최적화</text>
  <line x1="292" y1="100" x2="336" y2="100" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="340" y="78" width="110" height="44" rx="9" fill="url(#sg)"/>
  <text x="395" y="104" fill="#06101f" font-size="13" font-weight="800" text-anchor="middle">학습 모델</text>

  <!-- Test -->
  <text x="150" y="168" fill="#b6f3da" font-size="12" font-weight="700" text-anchor="middle">Test Step (분류)</text>
  <rect x="40" y="180" width="100" height="44" rx="9" fill="#0f1b30" stroke="#34d399"/>
  <text x="90" y="200" fill="#e7ecf5" font-size="11.5" text-anchor="middle">테스트 데이터</text>
  <text x="90" y="215" fill="#8390a8" font-size="10" text-anchor="middle">정답 모름</text>
  <line x1="142" y1="202" x2="338" y2="202" stroke="#34d399" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="195" fill="#8390a8" font-size="10" text-anchor="middle">모델에 입력</text>
  <rect x="340" y="180" width="110" height="44" rx="9" fill="#0f1b30" stroke="#34d399"/>
  <text x="395" y="200" fill="#e7ecf5" font-size="11.5" text-anchor="middle">예측 결과</text>
  <text x="395" y="215" fill="#8390a8" font-size="10" text-anchor="middle">클래스/실수</text>
  <line x1="395" y1="124" x2="395" y2="178" stroke="#42506b" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- scatter mini -->
  <rect x="470" y="78" width="92" height="146" rx="9" fill="#0c1626" stroke="#42506b"/>
  <text x="516" y="95" fill="#8390a8" font-size="9.5" text-anchor="middle">결정 경계</text>
  <line x1="478" y1="210" x2="556" y2="110" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="492" cy="120" r="4" fill="#4f86f7"/><circle cx="505" cy="135" r="4" fill="#4f86f7"/><circle cx="500" cy="150" r="4" fill="#4f86f7"/>
  <rect x="528" y="160" width="7" height="7" fill="#f472b6"/><rect x="540" y="175" width="7" height="7" fill="#f472b6"/><rect x="520" y="185" width="7" height="7" fill="#f472b6"/>
  <text x="300" y="300" fill="#8390a8" font-size="11" text-anchor="middle">표본추출 → 전문가 라벨링 → 특징선택 → 분류기학습 → 모델 생성 → 분류 실행</text>
</svg>
