<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="320" rx="16" fill="#0a1322"/>
  <text x="300" y="32" fill="#e7ecf5" font-size="17" font-weight="800" text-anchor="middle">로지스틱 회귀: 시그모이드로 확률 만들기</text>
  <!-- axes -->
  <line x1="70" y1="60" x2="70" y2="262" stroke="#42506b" stroke-width="2"/>
  <line x1="70" y1="262" x2="540" y2="262" stroke="#42506b" stroke-width="2"/>
  <!-- p=1 and p=0.5 guides -->
  <line x1="70" y1="74" x2="540" y2="74" stroke="#42506b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="60" y="78" fill="#8390a8" font-size="10" text-anchor="end">1.0</text>
  <line x1="70" y1="168" x2="540" y2="168" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="60" y="172" fill="#fbbf24" font-size="10" text-anchor="end">0.5</text>
  <text x="60" y="262" fill="#8390a8" font-size="10" text-anchor="end">0.0</text>
  <line x1="305" y1="60" x2="305" y2="262" stroke="#42506b" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="305" y="278" fill="#8390a8" font-size="10" text-anchor="middle">z = w·x + b = 0</text>
  <!-- sigmoid curve -->
  <path d="M80 256 C 200 252 250 240 305 168 C 360 96 410 80 530 72" fill="none" stroke="#22d3ee" stroke-width="3.5"/>
  <text x="430" y="64" fill="#a6eeff" font-size="12.5" font-weight="700">σ(z) = 1 / (1 + e^(−z))</text>
  <!-- region labels -->
  <text x="180" y="220" fill="#8390a8" font-size="11" text-anchor="middle">P &lt; 0.5 → 클래스 0</text>
  <text x="430" y="120" fill="#8390a8" font-size="11" text-anchor="middle">P &gt; 0.5 → 클래스 1</text>
  <text x="300" y="304" fill="#8390a8" font-size="11.5" text-anchor="middle">선형회귀 출력 z를 (0,1) 확률로 변환 · 0.5를 경계로 분류</text>
</svg>
