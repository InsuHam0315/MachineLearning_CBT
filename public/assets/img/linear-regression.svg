<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="320" rx="16" fill="#0a1322"/>
  <text x="300" y="32" fill="#e7ecf5" font-size="17" font-weight="800" text-anchor="middle">선형회귀: 잔차 제곱합을 최소화하는 직선</text>
  <!-- axes -->
  <line x1="70" y1="60" x2="70" y2="262" stroke="#42506b" stroke-width="2"/>
  <line x1="70" y1="262" x2="540" y2="262" stroke="#42506b" stroke-width="2"/>
  <text x="56" y="64" fill="#8390a8" font-size="11" text-anchor="end">y</text>
  <text x="540" y="282" fill="#8390a8" font-size="11" text-anchor="middle">x</text>
  <!-- regression line y = a x + b -->
  <line x1="80" y1="232" x2="528" y2="92" stroke="#22d3ee" stroke-width="3"/>
  <text x="470" y="86" fill="#a6eeff" font-size="12" font-weight="700">ŷ = a·x + b</text>
  <!-- points + residuals (vertical dashed) -->
  <g stroke="#f87171" stroke-width="1.6" stroke-dasharray="4 3">
    <line x1="130" y1="210" x2="130" y2="221"/>
    <line x1="200" y1="170" x2="200" y2="196"/>
    <line x1="270" y1="178" x2="270" y2="166"/>
    <line x1="340" y1="120" x2="340" y2="142"/>
    <line x1="410" y1="138" x2="410" y2="118"/>
    <line x1="470" y1="92" x2="470" y2="106"/>
  </g>
  <g fill="#4f86f7">
    <circle cx="130" cy="210" r="5.5"/><circle cx="200" cy="170" r="5.5"/><circle cx="270" cy="178" r="5.5"/>
    <circle cx="340" cy="120" r="5.5"/><circle cx="410" cy="138" r="5.5"/><circle cx="470" cy="92" r="5.5"/>
  </g>
  <text x="300" y="300" fill="#8390a8" font-size="11.5" text-anchor="middle">빨간 점선 = 잔차(실제값 − 예측값) · 최소제곱법은 Σ(잔차)² 을 최소화</text>
</svg>
