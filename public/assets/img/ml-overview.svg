<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="340" rx="16" fill="#0a1322"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f86f7"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <text x="300" y="34" fill="#e7ecf5" font-size="18" font-weight="800" text-anchor="middle">머신러닝 개요</text>
  <!-- root -->
  <rect x="232" y="52" width="136" height="40" rx="10" fill="url(#g1)"/>
  <text x="300" y="77" fill="#06101f" font-size="15" font-weight="800" text-anchor="middle">Machine Learning</text>
  <!-- branches -->
  <path d="M300 92 L150 132 M300 92 L450 132 M300 92 L300 132" stroke="#42506b" stroke-width="2" fill="none"/>
  <!-- 지도학습 -->
  <rect x="60" y="132" width="180" height="44" rx="10" fill="#11203b" stroke="#4f86f7"/>
  <text x="150" y="153" fill="#bcd2ff" font-size="14" font-weight="800" text-anchor="middle">지도학습</text>
  <text x="150" y="169" fill="#8390a8" font-size="11" text-anchor="middle">정답(label) 있음</text>
  <!-- 비지도 -->
  <rect x="360" y="132" width="180" height="44" rx="10" fill="#1b1733" stroke="#a78bfa"/>
  <text x="450" y="153" fill="#dccfff" font-size="14" font-weight="800" text-anchor="middle">비지도학습</text>
  <text x="450" y="169" fill="#8390a8" font-size="11" text-anchor="middle">정답 없음</text>
  <!-- 중앙 axis label -->
  <rect x="250" y="132" width="100" height="44" rx="10" fill="#0f1b30" stroke="#42506b"/>
  <text x="300" y="159" fill="#8390a8" font-size="11" text-anchor="middle">학습 방식</text>
  <!-- leaves 지도 -->
  <path d="M110 176 L90 214 M190 176 L210 214" stroke="#42506b" stroke-width="2" fill="none"/>
  <rect x="24" y="214" width="132" height="58" rx="9" fill="#0f1b30" stroke="#22d3ee"/>
  <text x="90" y="236" fill="#a6eeff" font-size="13" font-weight="700" text-anchor="middle">분류</text>
  <text x="90" y="254" fill="#8390a8" font-size="10.5" text-anchor="middle">출력=범주(이산)</text>
  <text x="90" y="268" fill="#8390a8" font-size="10" text-anchor="middle">로지스틱·SVM·트리·NB</text>
  <rect x="168" y="214" width="132" height="58" rx="9" fill="#0f1b30" stroke="#34d399"/>
  <text x="234" y="236" fill="#b6f3da" font-size="13" font-weight="700" text-anchor="middle">회귀</text>
  <text x="234" y="254" fill="#8390a8" font-size="10.5" text-anchor="middle">출력=실수(연속)</text>
  <text x="234" y="268" fill="#8390a8" font-size="10" text-anchor="middle">선형회귀</text>
  <!-- leaves 비지도 -->
  <path d="M450 176 L450 214" stroke="#42506b" stroke-width="2" fill="none"/>
  <rect x="384" y="214" width="132" height="58" rx="9" fill="#0f1b30" stroke="#a78bfa"/>
  <text x="450" y="236" fill="#dccfff" font-size="13" font-weight="700" text-anchor="middle">군집화</text>
  <text x="450" y="254" fill="#8390a8" font-size="10.5" text-anchor="middle">데이터 성질 파악</text>
  <text x="450" y="268" fill="#8390a8" font-size="10" text-anchor="middle">k-means · GMM</text>
  <text x="300" y="306" fill="#8390a8" font-size="11.5" text-anchor="middle">분류·회귀는 정답으로 학습, 군집은 정답 없이 비슷한 것끼리 묶음</text>
</svg>
