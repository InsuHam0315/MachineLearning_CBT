<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'Pretendard',system-ui,sans-serif">
  <rect width="600" height="320" rx="16" fill="#0a1322"/>
  <text x="300" y="34" fill="#e7ecf5" font-size="17" font-weight="800" text-anchor="middle">베이즈 규칙: 사전확률을 증거로 갱신</text>
  <!-- formula -->
  <rect x="120" y="56" width="360" height="52" rx="10" fill="#0f1b30" stroke="#a78bfa"/>
  <text x="300" y="80" fill="#dccfff" font-size="15" font-weight="800" text-anchor="middle">P(H|E) = P(E|H)·P(H) / P(E)</text>
  <text x="300" y="98" fill="#8390a8" font-size="10.5" text-anchor="middle">사후확률 = 우도 × 사전확률 ÷ 증거</text>
  <!-- prior bar -->
  <text x="80" y="150" fill="#8390a8" font-size="11">사전 P(H)</text>
  <rect x="150" y="140" width="300" height="18" rx="5" fill="#1b2740"/>
  <rect x="150" y="140" width="30" height="18" rx="5" fill="#4f86f7"/>
  <text x="462" y="154" fill="#bcd2ff" font-size="11">0.10</text>
  <!-- arrow -->
  <text x="300" y="184" fill="#22d3ee" font-size="12" text-anchor="middle">증거 E 관측 ↓ 갱신</text>
  <!-- posterior bar -->
  <text x="80" y="222" fill="#8390a8" font-size="11">사후 P(H|E)</text>
  <rect x="150" y="212" width="300" height="18" rx="5" fill="#1b2740"/>
  <rect x="150" y="212" width="138" height="18" rx="5" fill="#34d399"/>
  <text x="462" y="226" fill="#b6f3da" font-size="11">0.46</text>
  <!-- naive assumption -->
  <rect x="110" y="250" width="380" height="40" rx="9" fill="#0c1626" stroke="#42506b"/>
  <text x="300" y="268" fill="#e7ecf5" font-size="11.5" text-anchor="middle">나이브 가정: 특징들이 조건부 독립</text>
  <text x="300" y="283" fill="#8390a8" font-size="11" text-anchor="middle">P(x₁,…,xₙ | c) = P(x₁|c)·P(x₂|c)·…·P(xₙ|c)</text>
</svg>
